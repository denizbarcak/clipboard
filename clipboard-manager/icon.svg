<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Back layer - tilted -->
  <rect x="106" y="76" width="240" height="320" rx="28" fill="#6c5ce7" opacity="0.25" transform="rotate(-6 226 236)"/>

  <!-- Middle layer -->
  <rect x="146" y="80" width="240" height="320" rx="28" fill="#6c5ce7" opacity="0.5" transform="rotate(3 266 240)"/>

  <!-- Main card -->
  <rect x="136" y="68" width="240" height="320" rx="28" fill="url(#accent)"/>

  <!-- Text lines on main card -->
  <rect x="172" y="130" width="145" height="12" rx="6" fill="white" opacity="0.9"/>
  <rect x="172" y="162" width="105" height="12" rx="6" fill="white" opacity="0.5"/>
  <rect x="172" y="194" width="125" height="12" rx="6" fill="white" opacity="0.3"/>
</svg>
